<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CEKLOK PTK NBS</title>

    </script>

    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #f1f5f9;
            min-height: 100vh;
            padding: 6px 8px;
            display: flex;
            align-items: flex-start;
            justify-content: center;
        }

        .container {
            max-width: 550px;
            width: 100%;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 4px 10px;
            border-radius: 30px;
            margin-bottom: 6px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.04);
            min-height: 36px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .app-title {
            font-size: 0.75rem;
            font-weight: 700;
            color: #0f172a;
            letter-spacing: 0.3px;
            line-height: 1.2;
        }
        .app-title span {
            color: #3b82f6;
        }

        .datetime {
            font-size: 0.6rem;
            font-weight: 500;
            color: #1e293b;
            background: #f1f5f9;
            padding: 2px 8px;
            border-radius: 20px;
            white-space: nowrap;
            line-height: 1.4;
        }

        .icon-btn {
            background: transparent;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            padding: 4px;
            border-radius: 30px;
            width: 30px;
            height: 30px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            line-height: 1;
        }

        .icon-btn:hover {
            background: #e2e8f0;
        }

        .right-icons {
            display: flex;
            gap: 2px;
            align-items: center;
        }

        .card {
            background: white;
            border-radius: 18px;
            padding: 10px 12px;
            margin-bottom: 8px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.02);
        }

        .card-title {
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 6px;
            border-left: 3px solid #3b82f6;
            padding-left: 8px;
            color: #0f172a;
            line-height: 1.3;
        }

        select {
            width: 100%;
            padding: 8px 12px;
            font-size: 0.85rem;
            border-radius: 40px;
            border: 1px solid #cbd5e1;
            background: white;
            cursor: pointer;
            outline: none;
            line-height: 1.3;
        }

        .camera-wrapper {
            position: relative;
            background: #000;
            border-radius: 18px;
            overflow: hidden;
            margin: 4px 0;
            aspect-ratio: 3 / 4;
        }

        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        canvas {
            display: none;
        }

        .camera-overlay {
            position: absolute;
            bottom: 14px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            pointer-events: none;
        }

        /* ===== TOMBOL SHUTTER – MERAH POLOS DENGAN EFEK KLIK KEREN ===== */
        .btn-capture-overlay {
            pointer-events: auto;
            width: 76px;
            height: 76px;
            border-radius: 50%;
            cursor: pointer;
            display: block;
            border: 4px solid rgba(255, 255, 255, 0.7);
            background: radial-gradient(circle at 35% 30%, #ff4757, #c0392b 80%, #a93226);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            position: relative;
            transition: transform 0.15s ease, box-shadow 0.2s ease;
        }

        /* efek pantulan glossy ringan */
        .btn-capture-overlay::after {
            content: '';
            position: absolute;
            top: 8px;
            left: 22%;
            width: 32%;
            height: 14%;
            background: radial-gradient(ellipse, rgba(255, 255, 255, 0.5) 0%, transparent 70%);
            border-radius: 50%;
            opacity: 0.5;
            pointer-events: none;
        }

        /* ===== EFEK KETIKA DIKLIK ===== */
        .btn-capture-overlay:active {
            transform: scale(0.88);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3), 0 0 30px rgba(255, 50, 50, 0.6);
            transition: transform 0.08s ease, box-shadow 0.08s ease;
        }

        /* efek ripple / gelombang */
        .btn-capture-overlay:active::before {
            content: '';
            position: absolute;
            top: -8px;
            left: -8px;
            right: -8px;
            bottom: -8px;
            border-radius: 50%;
            border: 4px solid rgba(255, 80, 80, 0.7);
            animation: shutterRipple 0.4s ease-out forwards;
            pointer-events: none;
        }

        @keyframes shutterRipple {
            0% {
                transform: scale(0.8);
                opacity: 1;
                border-width: 4px;
            }
            100% {
                transform: scale(1.5);
                opacity: 0;
                border-width: 1px;
            }
        }

        /* efek pulse glow saat ditekan (cahaya merah berdenyut) */
        .btn-capture-overlay:active::after {
            content: '';
            position: absolute;
            top: -4px;
            left: -4px;
            right: -4px;
            bottom: -4px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 0, 0, 0.3) 0%, transparent 70%);
            animation: shutterGlow 0.5s ease-out forwards;
            pointer-events: none;
            opacity: 0;
        }

        @keyframes shutterGlow {
            0% {
                opacity: 0;
                transform: scale(0.9);
            }
            30% {
                opacity: 1;
                transform: scale(1.1);
            }
            100% {
                opacity: 0;
                transform: scale(1.4);
            }
        }

        /* ===== STATUS ===== */
        .status {
            margin-top: 8px;
            padding: 6px 10px;
            border-radius: 40px;
            background: #f8fafc;
            text-align: center;
            font-size: 0.75rem;
            color: #334155;
            line-height: 1.3;

        .status .loc-status {
            display: inline-block;
            margin-left: 6px;
            font-weight: 600;
            font-size: 0.75rem;
        }
        .loc-status.gps-ok {
            color: #166534;
        }
        .loc-status.gps-fail {
            color: #991b1b;
        }
        .loc-status.gps-loading {
            color: #b45309;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.3;
            }
        }

        .success {
            background: #dcfce7;
            color: #166534;
        }

        .error {
            background: #fee2e2;
            color: #991b1b;
        }

        .share-area {
            margin-top: 8px;
            text-align: center;
        }

        .btn-share {
            background: #25D366;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: transform 0.1s;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
            line-height: 1.3;
        }

        .btn-share:active {
            transform: scale(0.96);
        }

        .hidden {
            display: none;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            body {
                padding: 4px 6px;
            }
            .header {
                padding: 3px 8px;
                min-height: 32px;
                border-radius: 24px;
                margin-bottom: 4px;
            }
            .app-title {
                font-size: 0.65rem;
            }
            .datetime {
                font-size: 0.55rem;
                padding: 1px 6px;
            }
            .icon-btn {
                width: 26px;
                height: 26px;
                font-size: 1.1rem;
                padding: 2px;
            }
            .card {
                padding: 8px 10px;
                margin-bottom: 6px;
                border-radius: 14px;
            }
            .card-title {
                font-size: 0.7rem;
                margin-bottom: 4px;
                padding-left: 6px;
            }
            select {
                padding: 6px 10px;
                font-size: 0.75rem;
                border-radius: 30px;
            }
            .camera-wrapper {
                border-radius: 14px;
                margin: 2px 0;
            }
            .btn-capture-overlay {
                width: 64px;
                height: 64px;
                border-width: 3px;
                box-shadow: 0 3px 12px rgba(0, 0, 0, 0.35);
            }
            .btn-capture-overlay:active {
                transform: scale(0.87);
                box-shadow: 0 2px 6px rgba(0, 0, 0, 0.25), 0 0 25px rgba(255, 50, 50, 0.5);
            }
            .btn-capture-overlay:active::before {
                top: -6px;
                left: -6px;
                right: -6px;
                bottom: -6px;
                border-width: 3px;
            }
            .status {
                font-size: 0.65rem;
                padding: 4px 8px;
                margin-top: 6px;
            }
            .status .loc-status {
                font-size: 0.65rem;
            }
            .btn-share {
                font-size: 0.7rem;
                padding: 6px 14px;
            }
            .share-area {
                margin-top: 6px;
            }
        }

        @media (max-width: 380px) {
            .header {
                padding: 2px 6px;
                min-height: 28px;
            }
            .app-title {
                font-size: 0.55rem;
            }
            .datetime {
                font-size: 0.5rem;
                padding: 1px 4px;
            }
            .icon-btn {
                width: 22px;

                font-size: 0.95rem;
            }
            .card {
                padding: 6px 8px;
                margin-bottom: 4px;
                border-radius: 12px;
            }
            .card-title {
                font-size: 0.6rem;
                margin-bottom: 3px;
            }
            select {
                padding: 5px 8px;

            }
            .btn-capture-overlay {
                width: 56px;

                border-width: 2.5px;

            }
            .btn-capture-overlay:active {
                transform: scale(0.85);
                box-shadow: 0 1px 5px rgba(0, 0, 0, 0.2), 0 0 20px rgba(255, 50, 50, 0.4);
            }
            .btn-capture-overlay:active::before {
                top: -5px;
                left: -5px;
                right: -5px;
                bottom: -5px;
                border-width: 2.5px;
            }
            .status {
                font-size: 0.55rem;
                padding: 3px 6px;
                margin-top: 4px;

            .status .loc-status {
                font-size: 0.55rem;
            }
            .btn-share {
                font-size: 0.6rem;
                padding: 5px 12px;
            }
        }
    </style>

<body>

    <script>
        // ======================= KONFIGURASI =======================
        const firebaseConfig = {
            apiKey: "AIzaSyA-1YwxMQCOaA15yGn5E_wJlaxna64qhNk",
            authDomain: "ceklokguru.firebaseapp.com",
            projectId: "ceklokguru",
            storageBucket: "ceklokguru.firebasestorage.app",
            messagingSenderId: "583253273794",
            appId: "1:583253273794:web:d7d16a57b117baa0de1f5b"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const CLOUD_NAME = "dw63zuldz";
        const UPLOAD_PRESET = "presensi_guru";

        // ===== FUNGSI BANTU TANGGAL LOKAL =====
        function getLocalDate() {
            const now = new Date();
            const y = now.getFullYear();
            const m = String(now.getMonth() + 1).padStart(2, '0');
            const d = String(now.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        // DOM
        const guruSelect = document.getElementById('guruSelect');
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const captureBtn = document.getElementById('captureOverlay');
        const statusDiv = document.getElementById('statusMsg');
        const liveDateTime = document.getElementById('liveDateTime');
        const shareContainer = document.getElementById('shareContainer');
        const shareBtn = document.getElementById('shareBtn');

        let currentStream = null;
        let usingFront = true;
        let lastFotoUrl = "";
        let lastGuruNama = "";
        let lastJam = "";
        let lastImageBlob = null;
        let lastLocationText = "";
        let lastCoordText = "";
        let lastLocationRaw = null;

        // ======================= JAM REAL-TIME =======================
        function updateDateTime() {
            const now = new Date();
            const hari = now.toLocaleDateString('id-ID', { weekday: 'short', day: 'numeric', month: 'short' });
            const jam = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
            liveDateTime.innerHTML = `${hari} ${jam}`;
        }
        setInterval(updateDateTime, 1000);
        updateDateTime();

        // ======================= LOAD GURU =======================
        async function loadGuru() {
            try {
                const snapshot = await db.collection('guru').orderBy('nama').get();
                guruSelect.innerHTML = '<option value="">-- Pilih Guru --</option>';
                snapshot.forEach(doc => {
                    const option = document.createElement('option');
                    option.value = doc.id;
                    option.textContent = doc.data().nama;
                    guruSelect.appendChild(option);
                });
                if (snapshot.empty) statusDiv.innerHTML = "⚠️ Tambah guru via admin";
                else statusDiv.innerHTML = "✅ Pilih guru & tekan tombol kamera";
            } catch (err) {
                statusDiv.innerHTML = "Gagal load guru";
                console.error(err);
            }
        }

        // ======================= KAMERA =======================
        async function startCamera() {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }
            try {
                currentStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { exact: 'user' } }
                });
            } catch (err) {
                currentStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user' }
                });
            }
            video.srcObject = currentStream;
            await video.play();
        }

        // ======================= CROP RASIO 3:4 =======================
        function cropAndDrawPortrait(ctx, videoElement, targetCanvas) {
            const vw = videoElement.videoWidth;
            const vh = videoElement.videoHeight;
            const targetRatio = 3 / 4;
            const videoRatio = vw / vh;

            let sx, sy, sw, sh;
            if (videoRatio > targetRatio) {
                sh = vh;
                sw = vh * targetRatio;
                sx = (vw - sw) / 2;
                sy = 0;
            } else {
                sw = vw;
                sh = vw / targetRatio;
                sx = 0;
                sy = (vh - sh) / 2;
            }

            targetCanvas.width = 600;
            targetCanvas.height = 800;
            ctx.drawImage(videoElement, sx, sy, sw, sh, 0, 0, 600, 800);
        }

        function compressImageToBlob(canvas, maxSizeKB = 100) {
            return new Promise((resolve) => {
                let quality = 0.85;
                const tryCompress = () => {
                    canvas.toBlob(blob => {
                        if (blob.size / 1024 <= maxSizeKB || quality <= 0.2) {
                            resolve(blob);
                        } else {
                            quality -= 0.1;
                            tryCompress();
                        }
                    }, 'image/jpeg', quality);
                };
                tryCompress();
            });
        }

        // ======================= LOKASI GPS =======================
        function getLocationWithRetry(maxRetries = 3, timeout = 10000) {
            return new Promise((resolve, reject) => {
                let attempts = 0;
                let timerId = null;

                const tryGetLocation = () => {
                    attempts++;
                    if (timerId) clearTimeout(timerId);

                    const timeoutId = setTimeout(() => {
                        if (attempts < maxRetries) {
                            tryGetLocation();
                        } else {
                            reject(new Error('Timeout mendapatkan lokasi GPS'));
                        }
                    }, timeout);

                    navigator.geolocation.getCurrentPosition(
                        (pos) => {
                            clearTimeout(timeoutId);
                            resolve({
                                lat: pos.coords.latitude,
                                lng: pos.coords.longitude,
                                accuracy: pos.coords.accuracy,
                                timestamp: pos.timestamp
                            });
                        },
                        (err) => {
                            clearTimeout(timeoutId);
                            if (attempts < maxRetries) {
                                setTimeout(tryGetLocation, 1000);
                            } else {
                                reject(new Error(err.message || 'Gagal mendapatkan lokasi GPS'));
                            }
                        }, {
                            enableHighAccuracy: true,
                            timeout: timeout,
                            maximumAge: 30000
                        }
                    );
                };
                tryGetLocation();
            });
        }

        async function reverseGeocode(lat, lng) {
            try {
                const url =
                    `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&zoom=16&addressdetails=1&accept-language=id`;
                const response = await fetch(url, {
                    headers: { 'User-Agent': 'CEKLOK-NBS-App/1.0' }
                });
                if (!response.ok) throw new Error('Gagal reverse geocode');
                const data = await response.json();
                if (data && data.display_name) {
                    let address = data.display_name;
                    const parts = address.split(',');
                    if (parts.length > 4) {
                        address = parts.slice(0, 4).join(',').trim();
                    }
                    return address;
                }
                return null;
            } catch (e) {
                console.warn('Reverse geocode gagal:', e);
                return null;
            }
        }

        async function getFullLocation() {
            try {
                const pos = await getLocationWithRetry(3, 8000);
                let address = await reverseGeocode(pos.lat, pos.lng);

                let locationText = address ? `📍 ${address}` : "";
                let coordText = `📍 ${pos.lat.toFixed(6)}, ${pos.lng.toFixed(6)}`;
                if (pos.accuracy) coordText += ` (±${Math.round(pos.accuracy)}m)`;

                lastLocationRaw = pos;
                lastLocationText = locationText;
                lastCoordText = coordText;

                const statusMsg = document.getElementById('statusMsg');
                const existingLoc = statusMsg.querySelector('.loc-status');
                if (existingLoc) existingLoc.remove();
                const okSpan = document.createElement('span');
                okSpan.className = 'loc-status gps-ok';
                okSpan.textContent = '📍 GPS OK';
                statusMsg.appendChild(okSpan);

                return { text: locationText, coord: coordText, raw: pos, address: address };
            } catch (err) {
                lastLocationText = "";
                lastCoordText = "";
                lastLocationRaw = null;
                const statusMsg = document.getElementById('statusMsg');
                const existingLoc = statusMsg.querySelector('.loc-status');
                if (existingLoc) existingLoc.remove();
                const failSpan = document.createElement('span');
                failSpan.className = 'loc-status gps-fail';
                failSpan.textContent = '⚠️ GPS tidak tersedia';
                statusMsg.appendChild(failSpan);
                return { text: "", coord: "", raw: null, address: null };
            }
        }

        // ======================= METADATA FOTO =======================
        async function addMetadataToCanvas(canvasCtx, canvasElement, guruNama, locationInfo) {
            const now = new Date();
            const dayName = now.toLocaleDateString('id-ID', { weekday: 'long' });
            const dateStr = now.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
            const timeStr = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });

            const locationText = locationInfo && locationInfo.text ? locationInfo.text : "";
            const coordText = locationInfo && locationInfo.coord ? locationInfo.coord : "";
            lastLocationText = locationText;
            lastCoordText = coordText;

            const w = canvasElement.width;
            const h = canvasElement.height;

            const topH = 72;
            const gradTop = canvasCtx.createLinearGradient(0, 0, 0, topH);
            gradTop.addColorStop(0, 'rgba(0,0,0,0.7)');
            gradTop.addColorStop(1, 'rgba(0,0,0,0)');
            canvasCtx.fillStyle = gradTop;
            canvasCtx.fillRect(0, 0, w, topH);

            canvasCtx.shadowColor = 'rgba(0,0,0,0.9)';
            canvasCtx.shadowBlur = 8;
            canvasCtx.fillStyle = '#ffffff';
            canvasCtx.textAlign = 'center';
            canvasCtx.textBaseline = 'top';
            canvasCtx.font = 'bold 21px system-ui, -apple-system, sans-serif';
            canvasCtx.fillText('Aplikasi Presensi PTK Nurmilad Boarding School', w / 2, 14);

            const startY = h * 0.70;
            const gradBottom = canvasCtx.createLinearGradient(0, startY - 20, 0, h);
            gradBottom.addColorStop(0, 'rgba(0,0,0,0)');
            gradBottom.addColorStop(0.3, 'rgba(0,0,0,0.55)');
            gradBottom.addColorStop(1, 'rgba(0,0,0,0.8)');
            canvasCtx.fillStyle = gradBottom;
            canvasCtx.fillRect(0, startY - 20, w, h - startY + 20);

            canvasCtx.shadowColor = 'rgba(0,0,0,0.9)';
            canvasCtx.shadowBlur = 8;
            canvasCtx.fillStyle = '#ffffff';
            canvasCtx.textAlign = 'left';
            canvasCtx.textBaseline = 'top';

            let yPos = startY + 10;
            canvasCtx.font = 'bold 31px system-ui, -apple-system, sans-serif';
            canvasCtx.fillText(`Absen Masuk ${timeStr}`, 16, yPos);
            yPos += 37;
            canvasCtx.font = '20px system-ui, -apple-system, sans-serif';
            canvasCtx.fillText(`${dayName}, ${dateStr}`, 16, yPos);

            if (locationText) {
                yPos += 31;
                canvasCtx.font = '18px system-ui, -apple-system, sans-serif';
                let displayLoc = locationText.length > 45 ? locationText.substring(0, 42) + '...' : locationText;
                canvasCtx.fillText(displayLoc, 16, yPos);
            }
            if (coordText) {
                yPos += 31;
                canvasCtx.font = '17px system-ui, -apple-system, sans-serif';
                canvasCtx.fillText(coordText, 16, yPos);
            }
            yPos += 33;
            canvasCtx.font = 'bold 25px system-ui, -apple-system, sans-serif';
            canvasCtx.fillText(`Nama: ${guruNama}`, 16, yPos);

            canvasCtx.shadowBlur = 0;
            canvasCtx.textAlign = 'left';
            canvasCtx.textBaseline = 'alphabetic';
        }

        // ======================= CEK ABSEN HARI INI =======================
        async function sudahAbsenHariIni(guruId) {
            const today = getLocalDate();
            const q = await db.collection('presensi')
                .where('guruId', '==', guruId)
                .where('tanggal', '==', today)
                .limit(1)
                .get();
            return !q.empty;
        }

        // ======================= UPLOAD KE CLOUDINARY =======================
        async function uploadToCloudinary(blob) {
            const formData = new FormData();
            formData.append('file', blob, 'presensi.jpg');
            formData.append('upload_preset', UPLOAD_PRESET);
            const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
                method: 'POST',
                body: formData
            });
            if (!res.ok) {
                const errText = await res.text();
                throw new Error(`Cloudinary error: ${errText}`);
            }
            const data = await res.json();
            return data.secure_url;
        }

        // ======================= PROSES ABSEN =======================
        async function prosesAbsen() {
            const guruId = guruSelect.value;
            if (!guruId) {
                statusDiv.innerHTML = "❌ Pilih guru dulu";
                statusDiv.classList.add('error');
                return;
            }
            const guruNama = guruSelect.options[guruSelect.selectedIndex].text;

            if (await sudahAbsenHariIni(guruId)) {
                statusDiv.innerHTML = "⛔ Sudah absen hari ini!";
                statusDiv.classList.add('error');
                return;
            }

            statusDiv.innerHTML = "📷 Mengambil foto 3:4 & lokasi...";
            statusDiv.classList.remove('error', 'success');
            shareContainer.classList.add('hidden');

            statusDiv.innerHTML = "📡 Mengambil lokasi GPS...";
            let locationInfo;
            try {
                locationInfo = await getFullLocation();
            } catch (err) {
                locationInfo = { text: "", coord: "", raw: null, address: null };
                lastLocationText = "";
                lastCoordText = "";
            }

            statusDiv.innerHTML = "📸 Memotret...";
            const ctx = canvas.getContext('2d');
            cropAndDrawPortrait(ctx, video, canvas);
            await addMetadataToCanvas(ctx, canvas, guruNama, locationInfo);

            const compressedBlob = await compressImageToBlob(canvas, 100);
            lastImageBlob = compressedBlob;
            lastGuruNama = guruNama;

            statusDiv.innerHTML = "☁️ Upload ke Cloudinary...";
            let fotoUrl;
            try {
                fotoUrl = await uploadToCloudinary(compressedBlob);
            } catch (err) {
                statusDiv.innerHTML = "❌ Gagal upload foto: " + err.message;
                statusDiv.classList.add('error');
                return;
            }

            const now = new Date();
            const tanggal = getLocalDate();
            const jamMasuk = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            lastJam = jamMasuk;

            const locationData = locationInfo && locationInfo.raw ? {
                lat: locationInfo.raw.lat,
                lng: locationInfo.raw.lng,
                accuracy: locationInfo.raw.accuracy,
                address: locationInfo.address || null,
                text: locationInfo.text || ""
            } : {
                text: "",
                address: null,
                lat: null,
                lng: null,
                accuracy: null
            };

            const dataPresensi = {
                guruId,
                guruNama,
                tanggal,
                jamMasuk,
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                fotoUrl,
                location: locationData.text || "",
                locationLat: locationData.lat || null,
                locationLng: locationData.lng || null,
                locationAccuracy: locationData.accuracy || null,
                locationAddress: locationData.address || null
            };

            try {
                await db.collection('presensi').add(dataPresensi);
                statusDiv.innerHTML = `✅ Presensi berhasil! ${guruNama} ${jamMasuk}`;
                statusDiv.classList.add('success');
                lastFotoUrl = fotoUrl;
                shareContainer.classList.remove('hidden');
            } catch (err) {
                statusDiv.innerHTML = "❌ Gagal simpan: " + err.message;
                statusDiv.classList.add('error');
            }
        }

        // ======================= SHARE KE WHATSAPP =======================
        async function shareToWA() {
            if (!lastImageBlob) {
                alert("Tidak ada foto untuk dibagikan.");
                return;
            }
            if (navigator.share) {
                try {
                    const file = new File([lastImageBlob], "presensi_guru.jpg", { type: "image/jpeg" });
                    await navigator.share({
                        title: 'Presensi Guru',
                        text: `Presensi ${lastGuruNama} - ${lastJam}`,
                        files: [file]
                    });
                    return;
                } catch (e) {
                    if (e.name !== 'AbortError') {
                        console.warn("Share gagal, fallback ke link", e);
                    } else {
                        return;
                    }
                }
            }
            let locationShare = lastLocationText || lastCoordText || "";
            const text =
                `✅ *Presensi Guru*%0A📛 ${lastGuruNama}%0A🕒 ${lastJam}%0A📅 ${new Date().toLocaleDateString('id-ID')}%0A📍 ${locationShare}%0A📸 Link foto: ${lastFotoUrl}`;
            window.open(`https://wa.me/?text=${text}`, '_blank');
        }

        // ======================= NAVIGASI =======================
        document.getElementById('laporanIconBtn').onclick = () => window.location.href = 'laporan.html';
        document.getElementById('adminIconBtn').onclick = () => {
            const pwd = prompt("Password admin:");
            if (pwd === "admin123") {
                localStorage.setItem('adminLogged', 'true');
                window.location.href = "admin.html";
            } else {
                alert("Salah!");
            }
        };
        captureBtn.onclick = prosesAbsen;
        shareBtn.onclick = shareToWA;

        // ======================= INIT =======================
        async function init() {
            await loadGuru();
            try { await getFullLocation(); } catch (e) {}
            try { await startCamera(); } catch (e) { statusDiv.innerHTML = "❌ Izin kamera ditolak"; }
        }
        init();
    </script>
</body>
