<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Presensi Guru - Rekap</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }
        body {
            background: #f1f5f9;
            padding: 10px;
            font-size: 10px;
        }
        .container {
            max-width: 100%;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            margin-bottom: 16px;
        }
        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: flex-end;
            margin-bottom: 12px;
        }
        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        label {
            font-weight: 600;
            color: #334155;
            font-size: 10px;
        }
        select, button, input[type="date"] {
            padding: 6px 12px;
            border-radius: 30px;
            border: 1px solid #cbd5e1;
            font-size: 10px;
            background: white;
        }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background: #2563eb;
        }
        .btn-print {
            background: #10b981;
        }
        .btn-print:hover {
            background: #059669;
        }
        .back-link {
            display: inline-block;
            background: #475569;
            padding: 6px 16px;
            border-radius: 30px;
            color: white;
            text-decoration: none;
            font-size: 10px;
        }
        .back-link:hover {
            background: #334155;
        }

        /* Toggle mode */
        .mode-toggle {
            display: flex;
            gap: 4px;
            background: #e2e8f0;
            border-radius: 30px;
            padding: 3px;
            align-items: center;
        }
        .mode-toggle .mode-btn {
            padding: 4px 14px;
            border: none;
            border-radius: 30px;
            background: transparent;
            font-size: 10px;
            font-weight: 600;
            color: #475569;
            cursor: pointer;
            transition: 0.2s;
        }
        .mode-toggle .mode-btn.active {
            background: white;
            color: #1e40af;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
        }
        .mode-toggle .mode-btn:hover {
            background: rgba(255,255,255,0.5);
        }

        /* Elemen khusus cetak – disembunyikan di layar */
        .print-only {
            display: none;
        }

        /* ===== TABEL BULANAN (tetap) ===== */
        .table-wrap {
            overflow-x: auto;
            margin-top: 8px;
            position: relative;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 9px;
            min-width: 800px;
        }
        th, td {
            border: 1px solid #d1d5db;
            padding: 4px 2px;
            text-align: center;
            white-space: nowrap;
        }
        th:first-child,
        td:first-child {
            position: sticky;
            left: 0;
            z-index: 2;
            text-align: left;
            padding-left: 6px;
            min-width: 80px;
            max-width: 120px;
            background: #f8fafc;
            font-weight: 500;
        }
        th:first-child {
            z-index: 3;
            background: #eef2ff;
        }
        th:not(:first-child):not(:last-child),
        td:not(:first-child):not(:last-child) {
            min-width: 28px;
            max-width: 40px;
            padding: 2px 1px;
        }
        th:last-child, td:last-child {
            min-width: 30px;
            background: #f0fdf4;
            font-weight: bold;
        }
        td.jam-cell {
            cursor: pointer;
            transition: background 0.1s;
        }
        td.jam-cell:hover {
            background: #dbeafe;
        }
        td.jam-cell.empty {
            color: #ccc;
        }
        tr.total-row td {
            background: #f1f5f9;
            font-weight: bold;
        }
        tr.total-row td:first-child {
            background: #f1f5f9;
        }

        /* ===== GRID HARIAN ===== */
        .daily-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            margin-top: 8px;
        }
        .daily-grid .card-item {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            transition: transform 0.15s;
            border: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
        }
        .daily-grid .card-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }
        .daily-grid .card-item .photo-wrapper {
            position: relative;
            background: #000;
            aspect-ratio: 3 / 4;
            overflow: hidden;
        }
        .daily-grid .card-item .photo-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .daily-grid .card-item .photo-wrapper .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 6px 8px;
            background: linear-gradient(transparent, rgba(0,0,0,0.6));
            color: white;
            font-size: 9px;
            font-weight: 600;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }
        .daily-grid .card-item .info {
            padding: 6px 8px 8px;
            font-size: 9px;
            color: #1e293b;
            display: flex;
            flex-direction: column;
            gap: 2px;
            flex: 1;
        }
        .daily-grid .card-item .info .name {
            font-weight: 700;
            font-size: 10px;
            color: #0f172a;
        }
        .daily-grid .card-item .info .time {
            color: #475569;
        }
        .daily-grid .card-item .info .loc {
            color: #64748b;
            font-size: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .daily-grid .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            color: #94a3b8;
            padding: 40px 0;
            font-size: 12px;
        }

        /* Popup foto (modal) tetap sama */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            align-items: center;
            justify-content: center;
            z-index: 999;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 20px;
            max-width: 90%;
            max-height: 90%;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
            text-align: center;
            position: relative;
        }
        .modal-content img {
            max-width: 100%;
            max-height: 70vh;
            border-radius: 12px;
        }
        .modal-close {
            position: absolute;
            top: 8px;
            right: 16px;
            font-size: 24px;
            cursor: pointer;
            color: #475569;
        }
        .modal-close:hover {
            color: #1e293b;
        }
        .modal-info {
            margin-top: 8px;
            font-size: 11px;
            color: #334155;
        }

        /* ===== CETAK A4 LANDSCAPE ===== */
        @media print {
            @page {
                size: A4 landscape;
                margin: 12mm 8mm;
            }
            body {
                background: white;
                padding: 0;
                margin: 0;
            }
            .no-print {
                display: none !important;
            }
            .print-only {
                display: block !important;
            }
            .print-header {
                text-align: center;
                margin-bottom: 12px;
                font-size: 11px;
                line-height: 1.4;
            }
            .print-header .sekolah {
                font-weight: bold;
                font-size: 16px;
            }
            .print-header .judul {
                font-size: 14px;
                font-weight: 600;
                margin: 6px 0 4px;
                text-decoration: underline;
                text-underline-offset: 3px;
            }
            .print-header .subjudul {
                font-size: 11px;
                margin-bottom: 4px;
            }
            .print-header .line {
                border-top: 2px solid #000;
                margin: 4px 0 8px;
            }
            .table-wrap {
                overflow: visible !important;
            }
            table {
                font-size: 7px;
                min-width: auto;
                width: 100%;
            }
            th, td {
                padding: 2px 1px;
            }
            th:first-child, td:first-child {
                min-width: 50px;
                max-width: 80px;
                background: #f8fafc !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            th:not(:first-child):not(:last-child),
            td:not(:first-child):not(:last-child) {
                min-width: 18px;
            }
            th:first-child {
                background: #eef2ff !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            th:last-child, td:last-child {
                background: #f0fdf4 !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            tr.total-row td {
                background: #f1f5f9 !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            .modal-overlay {
                display: none !important;
            }
            .card {
                box-shadow: none;
                padding: 0;
                border-radius: 0;
                background: transparent;
            }
            th:first-child, td:first-child {
                position: static !important;
            }

            /* Cetak untuk grid harian */
            .daily-grid {
                display: grid !important;
                grid-template-columns: repeat(4, 1fr) !important;
                gap: 10px !important;
                page-break-inside: avoid;
            }
            .daily-grid .card-item {
                break-inside: avoid;
                border: 1px solid #ccc;
                box-shadow: none !important;
                transform: none !important;
            }
            .daily-grid .card-item .photo-wrapper {
                aspect-ratio: 3/4;
            }
            .daily-grid .card-item .photo-wrapper img {
                max-height: 120px;
                object-fit: cover;
            }
            .daily-grid .card-item .info .loc {
                white-space: normal;
                overflow: visible;
                text-overflow: clip;
            }

            .print-footer {
                margin-top: 16px;
                display: flex;
                flex-direction: column;
                align-items: flex-end;
                font-size: 10px;
                padding-top: 8px;
                border-top: 1px solid #aaa;
            }
            .print-footer .ttd {
                text-align: center;
                margin-top: 6px;
            }
            .print-footer .ttd .garis {
                margin-top: 20px;
                border-top: 1px solid #000;
                width: 120px;
                display: inline-block;
            }
            .print-footer .ttd .label {
                font-size: 9px;
                margin-top: 2px;
            }
            .print-footer .tanggal-text {
                font-size: 10px;
                margin-bottom: 4px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card no-print">
        <h2 style="font-size:14px; margin-bottom:10px; border-left:4px solid #3b82f6; padding-left:10px;">📊 Rekap Presensi</h2>

        <!-- Filter bar -->
        <div class="filter-bar">
            <!-- Mode toggle -->
            <div class="mode-toggle" id="modeToggle">
                <button class="mode-btn active" data-mode="monthly">📆 Bulanan</button>
                <button class="mode-btn" data-mode="daily">📅 Harian</button>
            </div>

            <!-- Filter bulanan -->
            <div class="filter-group" id="monthlyFilters">
                <label>Bulan</label>
                <select id="bulanSelect"></select>
            </div>
            <div class="filter-group" id="monthlyFilters2">
                <label>Tahun</label>
                <select id="tahunSelect"></select>
            </div>

            <!-- Filter harian -->
            <div class="filter-group" id="dailyFilters" style="display:none;">
                <label>Tanggal</label>
                <input type="date" id="dateInput">
            </div>

            <button id="filterBtn">🔍 Tampilkan</button>
            <button id="printBtn" class="btn-print">🖨 Cetak</button>
            <a href="index.html" class="back-link">← Kembali</a>
        </div>
    </div>

    <div class="card" id="laporanCard">
        <!-- Header cetak (muncul saat print) -->
        <div class="print-only print-header" id="printHeader">
            <div class="sekolah">YAYASAN KARYA CIPTA<br>NURMILAD BOARDING SCHOOL</div>
            <div style="font-size:10px;">nurmiladboardingschool@gmail.com | www.nurmilad.sch.id</div>
            <div class="line"></div>
            <div class="judul" id="printJudul">LAPORAN KEHADIRAN</div>
            <div class="subjudul" id="printBulanTahun">Bulan : ...  Tahun : ....</div>
            <div class="line" style="border-top:1px dashed #888; margin-top:2px;"></div>
        </div>

        <!-- Tempat konten (tabel bulanan atau grid harian) -->
        <div id="laporanContent">
            <p style="text-align:center; font-size:12px;">Pilih bulan/tanggal dan klik Tampilkan.</p>
        </div>

        <!-- Footer cetak (muncul saat print) -->
        <div class="print-only print-footer" id="printFooter">
            <div class="tanggal-text" id="printTanggal">Tanggal : ...</div>
            <div class="ttd">
                <div>Hormat kami,</div>
                <div class="garis"></div>
                <div class="label">(_________________________)</div>
            </div>
        </div>
    </div>
</div>

<!-- Modal popup foto -->
<div class="modal-overlay" id="fotoModal">
    <div class="modal-content">
        <span class="modal-close" id="modalClose">&times;</span>
        <img id="modalImg" src="" alt="Foto presensi">
        <div class="modal-info" id="modalInfo"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA-1YwxMQCOaA15yGn5E_wJlaxna64qhNk",
        authDomain: "ceklokguru.firebaseapp.com",
        projectId: "ceklokguru",
        storageBucket: "ceklokguru.firebasestorage.app",
        messagingSenderId: "583253273794",
        appId: "1:583253273794:web:d7d16a57b117baa0de1f5b"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // DOM
    const bulanSelect = document.getElementById('bulanSelect');
    const tahunSelect = document.getElementById('tahunSelect');
    const dateInput = document.getElementById('dateInput');
    const filterBtn = document.getElementById('filterBtn');
    const printBtn = document.getElementById('printBtn');
    const laporanContent = document.getElementById('laporanContent');
    const modalOverlay = document.getElementById('fotoModal');
    const modalImg = document.getElementById('modalImg');
    const modalInfo = document.getElementById('modalInfo');
    const modalClose = document.getElementById('modalClose');
    const modeToggle = document.getElementById('modeToggle');
    const monthlyFilters = document.getElementById('monthlyFilters');
    const monthlyFilters2 = document.getElementById('monthlyFilters2');
    const dailyFilters = document.getElementById('dailyFilters');
    const printBulanTahun = document.getElementById('printBulanTahun');
    const printTanggal = document.getElementById('printTanggal');
    const printJudul = document.getElementById('printJudul');

    let currentMode = 'monthly'; // 'monthly' or 'daily'

    // ======================= GENERATE PILIHAN BULAN & TAHUN =======================
    const bulanNama = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
    for (let i = 0; i < 12; i++) {
        let opt = document.createElement('option');
        opt.value = (i+1).toString().padStart(2,'0');
        opt.textContent = bulanNama[i];
        bulanSelect.appendChild(opt);
    }
    const tahunSekarang = new Date().getFullYear();
    for (let y = tahunSekarang-2; y <= tahunSekarang+1; y++) {
        let opt = document.createElement('option');
        opt.value = y;
        opt.textContent = y;
        tahunSelect.appendChild(opt);
    }
    // Set default
    const now = new Date();
    bulanSelect.value = String(now.getMonth()+1).padStart(2,'0');
    tahunSelect.value = now.getFullYear();
    // Set date input default today
    dateInput.value = now.toISOString().slice(0,10);

    // ======================= MODE TOGGLE =======================
    document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            currentMode = this.dataset.mode;
            if (currentMode === 'monthly') {
                monthlyFilters.style.display = '';
                monthlyFilters2.style.display = '';
                dailyFilters.style.display = 'none';
                // update print header
                printJudul.textContent = 'LAPORAN KEHADIRAN BULANAN';
            } else {
                monthlyFilters.style.display = 'none';
                monthlyFilters2.style.display = 'none';
                dailyFilters.style.display = '';
                printJudul.textContent = 'LAPORAN KEHADIRAN HARIAN';
            }
            // Auto-load after mode change?
            // We'll let user click filter.
        });
    });

    // ======================= LOAD LAPORAN =======================
    async function loadLaporan() {
        if (currentMode === 'monthly') {
            await loadMonthlyReport();
        } else {
            await loadDailyReport();
        }
    }

    // ===== MONTHLY REPORT (existing) =====
    let guruList = [];
    let presensiMap = {};

    async function loadMonthlyReport() {
        const bulan = bulanSelect.value;
        const tahun = tahunSelect.value;
        const lastDay = new Date(tahun, bulan, 0).getDate();

        laporanContent.innerHTML = '<p style="text-align:center;">⏳ Memuat data...</p>';

        try {
            const guruSnap = await db.collection('guru').orderBy('nama').get();
            if (guruSnap.empty) {
                laporanContent.innerHTML = '<p style="text-align:center;">⚠️ Belum ada data guru. Tambahkan guru terlebih dahulu.</p>';
                return;
            }
            guruList = [];
            guruSnap.forEach(doc => {
                guruList.push({ id: doc.id, nama: doc.data().nama });
            });

            const startDate = `${tahun}-${bulan}-01`;
            const endDate = `${tahun}-${bulan}-${String(lastDay).padStart(2,'0')}`;
            const presSnap = await db.collection('presensi')
                .where('tanggal', '>=', startDate)
                .where('tanggal', '<=', endDate)
                .get();

            presensiMap = {};
            presSnap.forEach(doc => {
                const data = doc.data();
                const key = data.guruId + '_' + data.tanggal;
                let jam = data.jamMasuk || '-';
                if (jam.length >= 5) jam = jam.substring(0,5);
                presensiMap[key] = {
                    jam: jam,
                    foto: data.fotoUrl || ''
                };
            });

            renderMonthlyTable(bulan, tahun, lastDay);

            // Update print info
            const bulanNamaIndo = bulanNama[parseInt(bulan)-1];
            printBulanTahun.textContent = `Bulan : ${bulanNamaIndo}  Tahun : ${tahun}`;
            const tglAkhir = new Date(tahun, bulan, 0);
            printTanggal.textContent = `Tanggal : ${tglAkhir.toLocaleDateString('id-ID', { day:'numeric', month:'long', year:'numeric' })}`;
        } catch (err) {
            console.error(err);
            laporanContent.innerHTML = `<div style="color:#dc2626; background:#fee2e2; padding:12px; border-radius:16px;">
                ❌ Gagal memuat data: ${err.message}</div>`;
        }
    }

    function renderMonthlyTable(bulan, tahun, lastDay) {
        let html = '<div class="table-wrap"><table>';
        html += '<thead><tr><th>Nama</th>';
        for (let d = 1; d <= lastDay; d++) {
            html += `<th>${d}</th>`;
        }
        html += '<th>Jml</th></tr></thead><tbody>';

        let totalHadirSemua = 0;
        guruList.forEach(guru => {
            let totalHadir = 0;
            html += `<tr><td>${escapeHtml(guru.nama)}</td>`;
            for (let d = 1; d <= lastDay; d++) {
                const tanggalStr = `${tahun}-${bulan}-${String(d).padStart(2,'0')}`;
                const key = guru.id + '_' + tanggalStr;
                const data = presensiMap[key];
                if (data) {
                    totalHadir++;
                    const jam = data.jam;
                    const foto = data.foto || '';
                    html += `<td class="jam-cell" data-foto="${escapeHtml(foto)}" data-guru="${escapeHtml(guru.nama)}" data-tanggal="${tanggalStr}" data-jam="${escapeHtml(jam)}">${escapeHtml(jam)}</td>`;
                } else {
                    html += `<td class="jam-cell empty">-</td>`;
                }
            }
            html += `<td>${totalHadir}</td></tr>`;
            totalHadirSemua += totalHadir;
        });

        html += `<tr class="total-row"><td><strong>Total</strong></td>`;
        for (let d = 1; d <= lastDay; d++) {
            const tanggalStr = `${tahun}-${bulan}-${String(d).padStart(2,'0')}`;
            let count = 0;
            guruList.forEach(guru => {
                const key = guru.id + '_' + tanggalStr;
                if (presensiMap[key]) count++;
            });
            html += `<td>${count}</td>`;
        }
        html += `<td><strong>${totalHadirSemua}</strong></td></tr>`;
        html += '</tbody></table></div>';
        laporanContent.innerHTML = html;

        // Event click pada sel jam (untuk popup foto)
        document.querySelectorAll('.jam-cell').forEach(cell => {
            const foto = cell.dataset.foto;
            if (foto) {
                cell.style.cursor = 'pointer';
                cell.addEventListener('click', function() {
                    const guru = this.dataset.guru;
                    const tanggal = this.dataset.tanggal;
                    const jam = this.dataset.jam;
                    showFoto(foto, guru, tanggal, jam);
                });
            }
        });
    }

    // ===== DAILY REPORT (GRID FOTO) =====
    async function loadDailyReport() {
        const selectedDate = dateInput.value;
        if (!selectedDate) {
            laporanContent.innerHTML = '<p style="text-align:center; color:#dc2626;">Silakan pilih tanggal.</p>';
            return;
        }

        laporanContent.innerHTML = '<p style="text-align:center;">⏳ Memuat data...</p>';

        try {
            const presSnap = await db.collection('presensi')
                .where('tanggal', '==', selectedDate)
                .get();

            if (presSnap.empty) {
                laporanContent.innerHTML = `<div class="daily-grid"><div class="empty-state">📭 Tidak ada presensi pada tanggal ${selectedDate}.</div></div>`;
                // Update print header
                printBulanTahun.textContent = `Tanggal : ${selectedDate}`;
                printTanggal.textContent = `Tanggal : ${selectedDate}`;
                return;
            }

            // Kumpulkan data
            const items = [];
            presSnap.forEach(doc => {
                const data = doc.data();
                items.push({
                    id: doc.id,
                    guruNama: data.guruNama || 'Tidak diketahui',
                    jamMasuk: data.jamMasuk || '-',
                    fotoUrl: data.fotoUrl || '',
                    location: data.location || '',
                    locationLat: data.locationLat || null,
                    locationLng: data.locationLng || null,
                });
            });

            // Urutkan berdasarkan jam (opsional)
            items.sort((a,b) => (a.jamMasuk > b.jamMasuk) ? 1 : -1);

            renderDailyGrid(items, selectedDate);

            // Update print info
            printBulanTahun.textContent = `Tanggal : ${selectedDate}`;
            printTanggal.textContent = `Tanggal : ${selectedDate}`;
        } catch (err) {
            console.error(err);
            laporanContent.innerHTML = `<div style="color:#dc2626; background:#fee2e2; padding:12px; border-radius:16px;">
                ❌ Gagal memuat data harian: ${err.message}</div>`;
        }
    }

    function renderDailyGrid(items, date) {
        if (items.length === 0) {
            laporanContent.innerHTML = `<div class="daily-grid"><div class="empty-state">📭 Tidak ada presensi pada tanggal ${date}.</div></div>`;
            return;
        }

        let html = `<div class="daily-grid">`;
        items.forEach(item => {
            const foto = item.fotoUrl || '';
            const name = escapeHtml(item.guruNama);
            const jam = escapeHtml(item.jamMasuk);
            const loc = escapeHtml(item.location) || '';

            html += `
                <div class="card-item">
                    <div class="photo-wrapper">
                        ${foto ? `<img src="${foto}" alt="Foto ${name}" loading="lazy" onclick="showFoto('${foto}','${name}','${date}','${jam}')">` : 
                        `<div style="background:#e2e8f0; width:100%; height:100%; display:flex; align-items:center; justify-content:center; color:#94a3b8; font-size:20px;">📷</div>`}
                        <div class="overlay">${name}</div>
                    </div>
                    <div class="info">
                        <div class="name">${name}</div>
                        <div class="time">🕒 ${jam}</div>
                        ${loc ? `<div class="loc">📍 ${loc}</div>` : ''}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        laporanContent.innerHTML = html;
    }

    // ======================= POPUP FOTO (sama) =======================
    function showFoto(fotoUrl, guru, tanggal, jam) {
        if (!fotoUrl) {
            alert('Tidak ada foto untuk presensi ini.');
            return;
        }
        modalImg.src = fotoUrl;
        modalInfo.innerHTML = `<strong>${escapeHtml(guru)}</strong> &bull; ${tanggal} &bull; Jam ${escapeHtml(jam)}`;
        modalOverlay.classList.add('active');
    }

    modalClose.addEventListener('click', () => {
        modalOverlay.classList.remove('active');
    });
    modalOverlay.addEventListener('click', (e) => {
        if (e.target === modalOverlay) {
            modalOverlay.classList.remove('active');
        }
    });

    // ======================= UTILITY =======================
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // ======================= EVENT =======================
    filterBtn.addEventListener('click', loadLaporan);
    printBtn.addEventListener('click', () => window.print());

    // ======================= INIT =======================
    // Tampilkan laporan bulanan default
    loadLaporan();
</script>
</body>
</html>
